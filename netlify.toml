[build]
  publish = "."
  functions = "netlify/functions"

# Serve index.html na raiz
[[redirects]]
  from = "/"
  to   = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/data"
  to   = "/.netlify/functions/data"
  status = 200

[[redirects]]
  from = "/api/status"
  to   = "/.netlify/functions/status"
  status = 200

[[redirects]]
  from = "/api/refresh"
  to   = "/.netlify/functions/refresh"
  status = 200

[[redirects]]
  from = "/api/budget"
  to   = "/.netlify/functions/budget"
  status = 200

[[redirects]]
  from = "/api/send-otp"
  to   = "/.netlify/functions/send-otp"
  status = 200

[[redirects]]
  from = "/api/verify-otp"
  to   = "/.netlify/functions/verify-otp"
  status = 200

[[redirects]]
  from = "/api/post-media"
  to   = "/.netlify/functions/post-media"
  status = 200

[[redirects]]
  from = "/api/get-scheduled"
  to   = "/.netlify/functions/get-scheduled"
  status = 200

[[redirects]]
  from = "/api/cancel-scheduled"
  to   = "/.netlify/functions/cancel-scheduled"
  status = 200

[build.environment]
  NODE_VERSION = "20"
